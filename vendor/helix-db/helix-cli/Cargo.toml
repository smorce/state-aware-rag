[package]
name = "helix-cli"
version = "3.0.5"
edition = "2024"

[dependencies]
helix-metrics = { path = "../metrics" }
clap = { version = "4.5.53", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.47.1", features = ["full"] }
eyre = "0.6.12"
toml = "0.9.5"
dirs = "6.0.0"
dotenvy = "0.15.7"
reqwest = { version = "0.12.23", features = ["json"] }
serde_json = "1.0.143"
color-eyre = "0.6.5"
cliclack = "0.3.7"
thiserror = "2.0.12"
self_update = "0.42.0"
chrono = "0.4.42"
flume = { version = "0.12.0",default-features = false,  features = ["async", "select"] }
futures-util = "0.3.31"
regex = "1.11.2"
reqwest-eventsource = "0.6"
indicatif = "0.18.3"
open = "5.3"
tui-banner = "0.2.3"
urlencoding = "2.1.3"
base64 = "0.22"
sha2 = "0.10"
flate2 = "1.1"


[lib]
name = "helix_cli"
path = "src/lib.rs"

[[bin]]
name = "helix"
path = "src/main.rs"
