[package]
name = "helix-db"
version = "2.0.4"
edition = "2021"
rust-version = "1.75"
description = "Library for working with HelixDB"
license = "Apache-2.0"
repository = "https://github.com/helixdb/helix-db/tree/main/sdks/rust"
documentation = "https://docs.rs/helix-db"
readme = "README.md"
keywords = ["graph", "database", "helixdb", "dsl", "query"]
categories = ["database", "data-structures"]

# # Standalone crate, not part of the root helix-db workspace.
# [workspace]

[lib]
path = "src/lib.rs"

[dependencies]
chrono = "0.4"
serde = { version = "1", features = ["derive"] }
sonic-rs = "0.5.8"
inventory = "0.3.24"
helix-dsl-macros = { version = "0.2.0", path = "helix-dsl-macros" }
reqwest = { version = "0.13.3" }
tokio = { version = "1", features = ["full"] }
thiserror = "2.0.18"
