name: CLI Tests

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'helix-cli/**'
      - 'metrics/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cli_tests.yml'
  push:
    branches: [main, dev]
    paths:
      - 'helix-cli/**'
      - 'metrics/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cli_tests.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: CLI Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') || 'fallback' }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate workspace metadata
        run: cargo metadata --no-deps --format-version 1

      - name: Check formatting
        run: cargo fmt --check

      - name: Check helix-cli
        run: cargo check -p helix-cli

      - name: Test helix-cli
        run: cargo test -p helix-cli

      - name: Clippy helix-cli
        run: cargo clippy -p helix-cli -- -D warnings
